name: 'Cleanup PHP Releases'
permissions:
  contents: write
on:
  workflow_dispatch:
    inputs:
      php-versions:
        description: 'PHP versions to cleanup'
        default: '8.2 8.3 8.4 8.5'
        required: true
jobs:
  get-matrix:
    runs-on: ubuntu-latest
    outputs:
      php_matrix: ${{ steps.set-matrix.outputs.php_matrix }}
    steps:
      - name: Get matrix
        id: set-matrix
        run: |
          IFS=' ' read -r -a PHP_VERSIONS <<<"${{ inputs.php-versions || '8.2 8.3 8.4 8.5' }}"
          php_array=()
          for php in "${PHP_VERSIONS[@]}"; do
            php_array+=("{\"php\": \"$php\"}")
          done
          echo "php_matrix={\"include\":[$(echo "${php_array[@]}" | sed -e 's|} {|}, {|g')]}"
          echo "php_matrix={\"include\":[$(echo "${php_array[@]}" | sed -e 's|} {|}, {|g')]}" >> "$GITHUB_OUTPUT"

  cleanup-preview:
    needs: get-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{fromJson(needs.get-matrix.outputs.php_matrix)}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find cleanup candidates
        run: bash scripts/release_cleanup_preview.sh cleanup-assets-${{ matrix.php }}.tsv
        env:
          GITHUB_RELEASES: php${{ matrix.php }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload cleanup list
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-assets-${{ matrix.php }}
          path: cleanup-assets-${{ matrix.php }}.tsv

  cleanup-apply:
    needs: [get-matrix, cleanup-preview]
    runs-on: ubuntu-latest
    environment: release-cleanup
    strategy:
      matrix: ${{fromJson(needs.get-matrix.outputs.php_matrix)}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download cleanup list
        uses: actions/download-artifact@v4
        with:
          name: cleanup-assets-${{ matrix.php }}

      - name: Delete cleanup candidates
        run: bash scripts/release_cleanup_apply.sh cleanup-assets-${{ matrix.php }}.tsv
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
