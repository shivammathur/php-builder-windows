name: 'Cleanup PHP Releases'
permissions:
  contents: write
on:
  workflow_dispatch:
    inputs:
      php-versions:
        description: 'PHP versions to cleanup'
        default: '8.2 8.3 8.4 8.5'
        required: true
jobs:
  get-matrix:
    runs-on: ubuntu-latest
    outputs:
      php_matrix: ${{ steps.set-matrix.outputs.php_matrix }}
    steps:
      - name: Get matrix
        id: set-matrix
        run: |
          IFS=' ' read -r -a PHP_VERSIONS <<<"${{ inputs.php-versions || '8.2 8.3 8.4 8.5' }}"
          php_array=()
          for php in "${PHP_VERSIONS[@]}"; do
            php_array+=("{\"php\": \"$php\"}")
          done
          echo "php_matrix={\"include\":[$(echo "${php_array[@]}" | sed -e 's|} {|}, {|g')]}"
          echo "php_matrix={\"include\":[$(echo "${php_array[@]}" | sed -e 's|} {|}, {|g')]}" >> "$GITHUB_OUTPUT"

  cleanup-preview:
    needs: get-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{fromJson(needs.get-matrix.outputs.php_matrix)}}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Find cleanup candidates
        run: bash scripts/release_cleanup_preview.sh cleanup-assets-${{ matrix.php }}.tsv
        env:
          GITHUB_RELEASES: php${{ matrix.php }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload cleanup list
        uses: actions/upload-artifact@v7
        with:
          name: cleanup-assets-${{ matrix.php }}
          path: cleanup-assets-${{ matrix.php }}.tsv

  get-cleanup-matrix:
    needs: cleanup-preview
    runs-on: ubuntu-latest
    outputs:
      cleanup_matrix: ${{ steps.set-cleanup-matrix.outputs.cleanup_matrix }}
    steps:
      - name: Download cleanup lists
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: cleanup-assets-*
          path: cleanup-lists
          merge-multiple: true

      - name: Build cleanup matrix
        id: set-cleanup-matrix
        run: |
          mkdir -p cleanup-lists
          shopt -s nullglob
          cleanup_array=()
          for file in cleanup-lists/cleanup-assets-*.tsv; do
            if [[ -s "$file" ]]; then
              version=$(basename "$file")
              version=${version#cleanup-assets-}
              version=${version%.tsv}
              cleanup_array+=("{\"php\": \"$version\"}")
            fi
          done

          if (( ${#cleanup_array[@]} == 0 )); then
            cleanup_matrix='{"include":[]}'
          else
            cleanup_matrix="{\"include\":[$(echo "${cleanup_array[@]}" | sed -e 's|} {|}, {|g')]}"
          fi

          echo "cleanup_matrix=$cleanup_matrix"
          echo "cleanup_matrix=$cleanup_matrix" >> "$GITHUB_OUTPUT"

  cleanup-apply:
    if: needs.get-cleanup-matrix.outputs.cleanup_matrix != '{"include":[]}'
    needs: get-cleanup-matrix
    runs-on: ubuntu-latest
    environment: release-cleanup
    strategy:
      matrix: ${{fromJson(needs.get-cleanup-matrix.outputs.cleanup_matrix)}}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download cleanup list
        uses: actions/download-artifact@v8
        with:
          name: cleanup-assets-${{ matrix.php }}

      - name: Delete cleanup candidates
        run: bash scripts/release_cleanup_apply.sh cleanup-assets-${{ matrix.php }}.tsv
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
